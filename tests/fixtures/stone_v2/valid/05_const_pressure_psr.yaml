# Rule: Downstream DesignPSR with top-level pressure operating constraint | Expected: valid

phases:
  gas:
    mechanism: gri30.yaml

stages:
  torch_stage:
    mechanism: gri30.yaml
    solve: advance
    advance_time: 1 ms
  psr_stage:
    mechanism: gri30.yaml
    solve: advance_to_steady_state

torch_stage:
- id: inlet_psr
  Reservoir:
    temperature: 300 K
    composition: CH4:1
- id: torch_psr
  IdealGasReactor:
    volume: 1 L
- id: inlet_psr_to_torch
  MassFlowController:
    mass_flow_rate: 0.1 kg/s
  source: inlet_psr
  target: torch_psr

psr_stage:
- id: psr
  DesignPSR:
    pressure: 1.3 bar
    t_res_s: 1 ms
- id: torch_to_psr_lc
  source: torch_psr
  target: psr
