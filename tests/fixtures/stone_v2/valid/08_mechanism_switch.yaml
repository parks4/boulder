# Rule: Logical connection with mechanism_switch for cross-mechanism handoff | Expected: valid

phases:
  fuel:
    mechanism: gri30.yaml
  air:
    mechanism: gri30.yaml

stages:
  torch_stage:
    mechanism: gri30.yaml
    solve: advance
    advance_time: 1 ms
  pfr_stage:
    mechanism: gri30.yaml
    solve: advance_to_steady_state

torch_stage:
- id: inlet_ms
  Reservoir:
    temperature: 300 K
    composition: CH4:1
- id: torch_ms
  IdealGasReactor:
    volume: 1 L
- id: inlet_ms_to_torch
  MassFlowController:
    mass_flow_rate: 0.1 kg/s
  source: inlet_ms
  target: torch_ms

pfr_stage:
- id: pfr_ms
  IdealGasReactor:
    volume: 10 L
- id: torch_to_pfr
  source: torch_ms
  target: pfr_ms
  mechanism_switch:
    htol: 3.0e-2
    Xtol: 1.0e-2
