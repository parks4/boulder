name: boulder
channels:
- conda-forge
- defaults
dependencies:
- pip
- cantera
- numpy>=2.4.0     # np.trapz replaced with np.trapezoid
- h5py             # composite-HDF5 result serialization (payload_store)
- pandas
- plotly
- pint
- pydantic
- graphviz          # dot, neato, … (Graphviz system binaries)
- python-graphviz   # Python bindings; uses dot from graphviz package above
- nodejs            # for the React frontend build (includes npm)
- pip:
  - fastapi>=0.110.0
  - "uvicorn[standard]>=0.27.0"
  - python-multipart>=0.0.6
  - PyYAML>=6.0
  - types-PyYAML>=6.0.0
  - "ruamel.yaml>=0.18.0"
  - python-dotenv>=1.0.0
