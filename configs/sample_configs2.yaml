metadata:
  title: Two-stream reactor
  description: >-
    Two inlet streams (air and methane) feeding a single stirred reactor with
    a Valve outlet. A simple two-MFC topology for testing network construction.
  version: "2.0"

phases:
  gas:
    mechanism: gri30.yaml

network:
- id: res1
  Reservoir:
    temperature: 300 K
    pressure: 101325 Pa
    composition: "O2:1,N2:3.76"

- id: res2
  Reservoir:
    temperature: 350 K
    pressure: 101325 Pa
    composition: "CH4:1"

- id: reactor1
  IdealGasReactor:
    volume: 0.01 m**3
    initial:
      temperature: 1200 K
      pressure: 101325 Pa
      composition: "CH4:1,O2:2,N2:7.52"

- id: exhaust
  OutletSink: {}

- id: mfc1
  MassFlowController:
    mass_flow_rate: 0.05 kg/s
  source: res1
  target: reactor1

- id: mfc2
  MassFlowController:
    mass_flow_rate: 0.02 kg/s
  source: res2
  target: reactor1

- id: reactor1_to_exhaust
  Valve:
    valve_coeff: 1.0
  source: reactor1
  target: exhaust

settings:
  end_time: 1.0
  dt: 0.01

output:
  reactor1:
  - "temperature, K"
  - "pressure, Pa"
