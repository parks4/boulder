metadata:
  name: "Grouped Reactors"
  description: "Two reactors in series in a single advance_to_steady_state stage."
  version: "1.0"

phases:
  gas:
    mechanism: gri30.yaml

stages:
  train_a:
    mechanism: gri30.yaml
    solve: advance_to_steady_state

train_a:
- id: res_in
  Reservoir:
    temperature: 300 K
    pressure: 101325 Pa
    composition: "CH4:1,O2:2,N2:7.52"

- id: r1
  IdealGasReactor:
    volume: 1.0e-4 m**3
    initial:
      temperature: 1000 K
      pressure: 101325 Pa
      composition: "CH4:1,O2:2,N2:7.52"

- id: r2
  IdealGasReactor:
    volume: 8.0e-5 m**3
    initial:
      temperature: 950 K
      pressure: 101325 Pa
      composition: "N2:1"

- id: res_out
  OutletSink: {}

- id: mfc_in
  MassFlowController:
    mass_flow_rate: 0.05 kg/s
  source: res_in
  target: r1

- id: mfc_mid
  MassFlowController:
    mass_flow_rate: 0.05 kg/s
  source: r1
  target: r2

- id: mfc_out
  MassFlowController:
    mass_flow_rate: 0.05 kg/s
  source: r2
  target: res_out

output:
  r1:
  - "temperature, K"
  r2:
  - "temperature, K"
