metadata:
  title: "Staged PSR + PFR (staged solver demo)"
  description: |-
    Demonstrates Boulder staged solving architecture.

    Stage 1 (psr_stage): a PSR representing an ignition zone, solved first.
    Stage 2 (pfr_stage): a 4-cell CSTR chain approximating a PFR, initialized
    from the PSR outlet state.

phases:
  gas:
    mechanism: gri30.yaml

stages:
  psr_stage:
    mechanism: gri30.yaml
    solve: advance
    advance_time: 1.0e-3
  pfr_stage:
    mechanism: gri30.yaml
    solve: advance
    advance_time: 1.0e-3

psr_stage:
- id: feed
  Reservoir:
    temperature: 300 K
    pressure: 101325 Pa
    composition: "CH4:1,O2:2,N2:7.52"
  description: Premixed CH4/air feed.

- id: psr
  IdealGasConstPressureMoleReactor:
    volume: 1.0e-5 m**3
    initial:
      temperature: 2200 K
      pressure: 101325 Pa
      composition: "CO2:1,H2O:2,N2:7.52"
  description: Perfectly-stirred reactor.

- id: feed_to_psr
  MassFlowController:
    mass_flow_rate: 1.0e-4 kg/s
  source: feed
  target: psr

pfr_stage:
- id: pfr_cell_1
  IdealGasConstPressureMoleReactor:
    volume: 2.5e-6 m**3
    initial:
      temperature: 2200 K
      pressure: 101325 Pa
      composition: CO2:1,H2O:2,N2:7.52
  description: First cell of the PFR chain.

- id: pfr_cell_2
  IdealGasConstPressureMoleReactor:
    volume: 2.5e-6 m**3
    initial:
      temperature: 2200 K
      pressure: 101325 Pa
      composition: CO2:1,H2O:2,N2:7.52

- id: pfr_cell_3
  IdealGasConstPressureMoleReactor:
    volume: 2.5e-6 m**3
    initial:
      temperature: 2200 K
      pressure: 101325 Pa
      composition: CO2:1,H2O:2,N2:7.52

- id: pfr_cell_4
  IdealGasConstPressureMoleReactor:
    volume: 2.5e-6 m**3
    initial:
      temperature: 2200 K
      pressure: 101325 Pa
      composition: CO2:1,H2O:2,N2:7.52

- id: psr_to_pfr
  source: psr
  target: pfr_cell_1
  mass_flow_rate: 1.0e-4 kg/s
  description: Logical inter-stage connection.

- id: pfr_1_to_2
  MassFlowController:
    mass_flow_rate: 1.0e-4 kg/s
  source: pfr_cell_1
  target: pfr_cell_2

- id: pfr_2_to_3
  MassFlowController:
    mass_flow_rate: 1.0e-4 kg/s
  source: pfr_cell_2
  target: pfr_cell_3

- id: pfr_3_to_4
  MassFlowController:
    mass_flow_rate: 1.0e-4 kg/s
  source: pfr_cell_3
  target: pfr_cell_4

settings: {}
